<!DOCTYPE html>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#06101f;color:#eaf2ff;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  .bar{display:flex;align-items:center;gap:6px;padding:14px 22px;border-bottom:1px solid #122a47;font-size:13px}
  .bar a{color:#8aa0bf;text-decoration:none;padding:7px 13px;border-radius:8px;font-weight:500}

  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:64px;padding:60px 24px}
  .label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#516a8e;text-align:center;margin-bottom:22px}
  .block{display:flex;flex-direction:column;align-items:center}
  .lockup{display:flex;align-items:center;gap:24px}
  .lockup .mk{width:118px;height:118px;filter:drop-shadow(0 8px 24px rgba(47,111,207,.45))}
  .lockup .wm{font-size:60px;font-weight:800;letter-spacing:-.02em;line-height:1;background:linear-gradient(180deg,#fff,#cfe0fb);-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}
  .lockup .tg{font-size:17px;color:#8aa0bf;margin-top:8px;font-weight:500}
  .mark-xl{width:360px;height:360px;background:
    repeating-linear-gradient(0deg,transparent,transparent 41px,rgba(255,255,255,.04) 41px,rgba(255,255,255,.04) 42px),
    repeating-linear-gradient(90deg,transparent,transparent 41px,rgba(255,255,255,.04) 41px,rgba(255,255,255,.04) 42px);
    border:1px solid #122a47;border-radius:18px;display:grid;place-items:center}
  .mark-xl svg{width:300px;height:300px;filter:drop-shadow(0 10px 30px rgba(47,111,207,.4))}
  .compare{display:flex;gap:36px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
  .col{display:flex;flex-direction:column;align-items:center;gap:14px}
  .col .cap{font-size:13.5px;color:#cdd9ee;font-weight:600;text-align:center}
  .col .cap span{display:block;font-size:11px;color:#516a8e;font-weight:400;margin-top:3px}
  .mark-md{width:272px;height:272px;background:repeating-linear-gradient(0deg,transparent,transparent 41px,rgba(255,255,255,.04) 41px,rgba(255,255,255,.04) 42px),repeating-linear-gradient(90deg,transparent,transparent 41px,rgba(255,255,255,.04) 41px,rgba(255,255,255,.04) 42px);border:1px solid #122a47;border-radius:18px;display:grid;place-items:center}
  .mark-md.sel{border-color:#2f7ad6;box-shadow:0 0 0 1px #2f7ad6,0 20px 50px -24px rgba(47,122,214,.5)}
  .mark-md svg{width:212px;height:212px;filter:drop-shadow(0 10px 30px rgba(47,111,207,.35))}
  .swatches{display:flex;margin-top:14px;border-radius:10px;overflow:hidden;border:1px solid #122a47}
  .sw{width:84px;height:52px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;font-size:10px;font-family:monospace;color:rgba(255,255,255,.9)}
  @media (max-width:640px){.lockup{flex-direction:column;text-align:center}.lockup .wm{font-size:44px}}
</style>
</head>

                <radialGradient id="g1c" cx="0.4" cy="0.35" r="0.7"><stop offset="0" stop-color="#dcebff"/><stop offset="1" stop-color="#6aa6ee"/></radialGradient>

              <polygon points="43,13.2 43,34.8 24,24" fill="#234f96"/>
